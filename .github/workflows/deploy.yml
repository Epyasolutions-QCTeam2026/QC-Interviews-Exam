name: Deploy QA Interview Platform

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          const _SUPA_URL = 'SUPABASE_URL_PLACEHOLDER';
          const _SUPA_KEY = 'SUPABASE_KEY_PLACEHOLDER';
          ENDOFFILE
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" config.js
          sed -i "s|SUPABASE_KEY_PLACEHOLDER|${{ secrets.SUPABASE_KEY }}|g" config.js
          echo "config.js generated successfully"
          cat config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github'

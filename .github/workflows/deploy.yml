name: Inject Supabase credentials

on:
  push:
    branches: [main]
    paths-ignore:
      - 'config.js'   # prevent infinite loop

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js with real credentials
        run: |
          cat > config.js << ENDOFFILE
          const _SUPA_URL = '${{ secrets.SUPABASE_URL }}';
          const _SUPA_KEY = '${{ secrets.SUPABASE_KEY }}';
          ENDOFFILE

      - name: Commit config.js to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.js
          git diff --staged --quiet || git commit -m "chore: inject Supabase credentials [skip ci]"
          git push

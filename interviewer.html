<!DOCTYPE html>
<!-- QA Interview Platform | Built: 2026-05-17 14:51:18 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Interview — Interviewer Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f0eff9;--surface:#fff;--surface2:#e9e7f7;
  --border:rgba(80,70,228,.12);--border2:rgba(80,70,228,.22);
  --text:#1a1a18;--text2:#6b6b64;--text3:#a8a89e;
  --accent:#5046e4;--accent-bg:#eeecfd;--accent-text:#3730c0;
  --red:#c0392b;--red-bg:#fdf0ee;
  --orange:#b35a00;--orange-bg:#fdf3e7;
  --blue:#1a5fa8;--blue-bg:#e8f1fb;
  --green:#2d7a3a;--green-bg:#eaf4ec;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}

/* HEADER */
.header{background:var(--accent);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:#fff;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.logo-text{white-space:nowrap}
.header-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.view-toggle{display:flex;gap:3px;background:rgba(255,255,255,.12);border-radius:var(--rs);padding:3px}
.vtab{padding:5px 12px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:none;background:none;color:rgba(255,255,255,.7);border-radius:4px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.vtab.active{background:rgba(255,255,255,.25);color:#fff}
.exam-toggle-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:20px;padding:5px 12px}
.exam-toggle-label{font-size:12px;font-weight:600;color:#fff;white-space:nowrap}
.toggle-track{width:38px;height:20px;border-radius:20px;cursor:pointer;transition:background .2s;position:relative;flex-shrink:0;border:none;padding:0}
.toggle-track.on{background:#6effa0}.toggle-track.off{background:rgba(255,255,255,.25)}
.toggle-thumb{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-track.on .toggle-thumb{left:20px}.toggle-track.off .toggle-thumb{left:2px}
.exam-status-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;white-space:nowrap}
.exam-status-badge.on{background:rgba(110,255,160,.2);color:#6effa0}
.exam-status-badge.off{background:rgba(255,255,255,.15);color:rgba(255,255,255,.6)}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-size:12px;color:#fff;font-weight:500;white-space:nowrap}
.dot{width:7px;height:7px;background:#6effa0;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hbtn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:var(--rs);padding:6px 12px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.28)}
.hbtn-green{background:rgba(46,160,67,.3)}.hbtn-green:hover{background:rgba(46,160,67,.5)}

/* TWO-PANE LAYOUT */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 56px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto}
.sidebar-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding:0 4px}
.cand-card{border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:var(--surface)}
.cand-card:hover{border-color:var(--border2);background:var(--accent-bg)}
.cand-card.active{border-color:var(--accent);background:var(--accent-bg)}
.cand-card.is-dummy{opacity:.55;border-style:dashed}
.cand-name{font-size:14px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.res-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.res-dot.pass{background:var(--green)}.res-dot.fail{background:var(--red)}.res-dot.pending{background:var(--text3)}
.dummy-chip{font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:#fff3e0;color:#b35a00;border:1px solid #e07b00}
.cand-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.chip{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--text2);font-weight:500;display:flex;align-items:center;gap:3px}
.chip.score-hi{background:var(--green-bg);color:var(--green)}.chip.score-mid{background:var(--orange-bg);color:var(--orange)}.chip.score-lo{background:var(--red-bg);color:var(--red)}
.chip.res-pass{background:var(--green-bg);color:var(--green)}.chip.res-fail{background:var(--red-bg);color:var(--red)}
.cand-time{font-size:11px;color:var(--text3)}
.empty-sidebar{text-align:center;padding:28px 12px;color:var(--text3);font-size:13px}

/* DETAIL */
.detail{padding:24px 26px;overflow-y:auto}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;color:var(--text3)}
.welcome i{font-size:40px;margin-bottom:12px;opacity:.4}
.welcome p{font-size:14px}
.cand-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.avatar{width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:600;flex-shrink:0}
.cand-header-info h2{font-size:20px;font-weight:600}
.cand-header-info p{font-size:13px;color:var(--text2);margin-top:2px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.mval{font-size:26px;font-weight:600;color:var(--accent)}
.mlbl{font-size:12px;color:var(--text2);margin-top:1px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
.ct{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:11px;display:flex;align-items:center;gap:7px}

/* ANSWER KEY */
.ak-scroll{max-height:360px;overflow-y:auto;padding-right:4px}
.arow{display:flex;align-items:flex-start;gap:8px;padding:7px 5px;border-radius:var(--rs);margin-bottom:2px;font-size:13px;transition:background .1s}
.arow:hover{background:var(--surface2)}
.aicon{font-size:17px;min-width:18px;margin-top:1px;flex-shrink:0}
.found-c{color:var(--green)}.miss-c{color:var(--text3)}
.bug-area{font-size:13px;flex:1}
.bdesc{color:var(--text2);margin-top:1px}
.sev-pip{font-size:10px;padding:1px 6px;border-radius:20px;font-weight:600;margin-left:5px;vertical-align:middle}
.pip-critical{background:var(--red-bg);color:var(--red)}.pip-high{background:var(--orange-bg);color:var(--orange)}
.pip-medium{background:var(--blue-bg);color:var(--blue)}.pip-low{background:var(--green-bg);color:var(--green)}
.cbrow{display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;transition:background .1s}
.cbrow:hover{background:var(--surface2)}
.cbrow input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.verdict{margin-top:12px;padding:11px 14px;border-radius:var(--r);font-size:14px;font-weight:600;text-align:center}
.v-pass{background:var(--green-bg);color:var(--green)}.v-review{background:var(--orange-bg);color:var(--orange)}.v-fail{background:var(--red-bg);color:var(--red)}

/* DECISION */
.decision-wrap{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}
.dec-btn{flex:1;min-width:80px;padding:10px 8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:2px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--surface);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.dec-btn:hover{background:var(--surface2)}
.dec-pass{border-color:var(--green);color:var(--green)}.dec-pass.selected{background:var(--green);color:#fff;border-color:var(--green)}
.dec-fail{border-color:var(--red);color:var(--red)}.dec-fail.selected{background:var(--red);color:#fff;border-color:var(--red)}
.dec-pending{border-color:var(--text3);color:var(--text3)}.dec-pending.selected{background:var(--text3);color:#fff}
.decision-note{font-size:12px;color:var(--text3);margin-top:8px;text-align:center}

/* DUMMY TOGGLE */
.dummy-toggle-wrap{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--surface2);border-radius:var(--rs);margin-bottom:10px;flex-wrap:wrap;gap:8px}
.dummy-toggle-label{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.dummy-banner{background:#fff8ec;border:1px solid #f5d78e;border-radius:var(--rs);padding:9px 13px;font-size:13px;color:#8a6200;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* SUBMISSIONS */
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.bug-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;border-left:3px solid var(--border);margin-bottom:8px}
.bug-item.sev-critical{border-left-color:var(--red)}.bug-item.sev-high{border-left-color:#e07b00}
.bug-item.sev-medium{border-left-color:var(--blue)}.bug-item.sev-low{border-left-color:var(--green)}
.bh{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.bid{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}
.btitle{font-size:14px;font-weight:600;flex:1}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-critical{background:var(--red-bg);color:var(--red)}.badge-high{background:var(--orange-bg);color:var(--orange)}
.badge-medium{background:var(--blue-bg);color:var(--blue)}.badge-low{background:var(--green-bg);color:var(--green)}
.bdet{font-size:13px;color:var(--text2);margin-bottom:2px}
.tc-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:8px}
.th{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.tid{font-family:'DM Mono',monospace;font-size:11px;background:var(--surface2);padding:2px 7px;border-radius:4px;color:var(--text2)}
.ttitle{font-size:14px;font-weight:600;flex:1}
.pri{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;background:var(--accent-bg);color:var(--accent-text)}
.rbadge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.rb-pass{background:var(--green-bg);color:var(--green)}.rb-fail{background:var(--red-bg);color:var(--red)}.rb-pend{background:var(--surface2);color:var(--text3)}
.tdet{font-size:13px;color:var(--text2);margin-bottom:3px}
.steps-ol{font-size:13px;color:var(--text2);padding-left:16px;margin:3px 0 6px}
.steps-ol li{margin-bottom:2px}
.empty-sec{text-align:center;padding:20px;color:var(--text3);font-size:13px;border:1px dashed var(--border);border-radius:var(--r)}

/* NOTES & CONTROLS */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.notes-ta{width:100%;min-height:95px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--rs);background:var(--surface);color:var(--text);outline:none;resize:vertical}
.notes-ta:focus{border-color:var(--accent)}
.ctrl-desc{font-size:13px;color:var(--text2);margin-bottom:12px}
.clear-btn{padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;background:var(--red-bg);color:var(--red);border:1px solid var(--red);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.clear-btn:hover{background:#f2c8c4}

/* DASHBOARD */
#dashboard-view{display:none;padding:24px 26px;overflow-y:auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.dash-header h2{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.export-btn{padding:9px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;background:var(--green);color:#fff;border:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s}
.export-btn:hover{background:#236130}
.dash-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:22px}
.dash-metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;text-align:center}
.dm-val{font-size:28px;font-weight:600}
.dm-val.c-total{color:var(--accent)}.dm-val.c-pass{color:var(--green)}.dm-val.c-fail{color:var(--red)}.dm-val.c-pend{color:var(--text3)}.dm-val.c-avg{color:var(--blue)}
.dm-lbl{font-size:12px;color:var(--text2);margin-top:3px}
.dash-charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.chart-card h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:13px}
.bar-label{min-width:70px;color:var(--text2);text-align:right;font-size:12px}
.bar-track{flex:1;height:24px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:12px;font-weight:600;color:#fff;transition:width .5s ease}
.bar-fill.bf-pass{background:var(--green)}.bar-fill.bf-fail{background:var(--red)}.bar-fill.bf-pend{background:var(--text3)}
.bar-count{min-width:24px;font-size:12px;font-weight:600;color:var(--text2)}
.donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.dl-row{display:flex;align-items:center;gap:8px;font-size:13px}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.results-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;overflow-x:auto}
.results-table-wrap h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1.5px solid var(--border2);background:var(--surface2)}
td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.res-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:3px 9px;border-radius:20px;font-weight:600}
.res-badge.pass{background:var(--green-bg);color:var(--green)}.res-badge.fail{background:var(--red-bg);color:var(--red)}.res-badge.pending{background:var(--surface2);color:var(--text3)}

/* RESPONSIVE */
@media(max-width:900px){
  .layout{grid-template-columns:250px 1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .dash-metrics{grid-template-columns:repeat(3,1fr)}
  .two,.sub-grid,.bottom-grid,.dash-charts{grid-template-columns:1fr}
}
@media(max-width:720px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);max-height:200px;overflow-y:auto;padding:10px 10px}
  .detail{padding:16px 14px}
  #dashboard-view{padding:16px 14px}
  .header{padding:10px 14px}
  .logo-text{display:none}
  .header-controls{width:100%}
  .view-toggle{flex:1}
  .vtab{flex:1;justify-content:center;font-size:12px;padding:5px 8px}
  .exam-toggle-label{display:none}
  .live-pill{display:none}
  .metrics{grid-template-columns:repeat(2,1fr);gap:8px}
  .dash-metrics{grid-template-columns:repeat(2,1fr);gap:8px}
  .dash-header{flex-direction:column;align-items:flex-start}
  .export-btn{width:100%;justify-content:center}
  .decision-wrap{flex-direction:column}
  .dec-btn{width:100%}
}
@media(max-width:480px){
  .header{padding:8px 10px}
  .hbtn .btn-label{display:none}
  .hbtn{padding:6px 8px}
  .exam-toggle-wrap{padding:4px 8px}
  .sidebar{max-height:160px;padding:8px 8px}
  .cand-card{padding:9px 10px;margin-bottom:6px}
  .cand-name{font-size:13px}
  .chip{font-size:10px;padding:1px 5px}
  .detail{padding:12px 10px}
  #dashboard-view{padding:12px 10px}
  .metrics{gap:7px}
  .mval{font-size:22px}
  .card{padding:13px 13px}
  .ct{font-size:11px}
  .two{grid-template-columns:1fr}
  .sub-grid{grid-template-columns:1fr}
  .bottom-grid{grid-template-columns:1fr}
  .arow{font-size:12px}
  .cbrow{font-size:12px;padding:6px 6px}
  .dash-metrics{grid-template-columns:repeat(2,1fr);gap:7px}
  .dm-val{font-size:22px}
  .dash-charts{grid-template-columns:1fr}
  .donut-wrap{flex-direction:column;align-items:flex-start;gap:12px}
  .bar-label{min-width:55px;font-size:11px}
  .cand-header{flex-direction:column;align-items:flex-start;gap:10px}
  .dummy-toggle-wrap{flex-direction:column;align-items:flex-start}
  .notes-ta{min-height:75px}
  .results-table-wrap{padding:12px 10px}
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 0 0-9 9v.5c0 2.5 1.5 4.5 3.5 5.5l1.5-3"/><path d="M12 3a9 9 0 0 1 9 9v.5c0 2.5-1.5 4.5-3.5 5.5l-1.5-3"/><circle cx="12" cy="12" r="2"/><path d="M12 14v5"/></svg>
    </div>
    <span class="logo-text">Interviewer Panel</span>
  </div>

  <div class="header-controls">
    <div class="view-toggle">
      <button class="vtab active" id="vtab-candidates" onclick="switchView('candidates')"><i class="ti ti-users"></i> <span>Candidates</span></button>
      <button class="vtab" id="vtab-dashboard" onclick="switchView('dashboard')"><i class="ti ti-chart-bar"></i> <span>Dashboard</span></button>
    </div>
    <div class="exam-toggle-wrap">
      <span class="exam-toggle-label">Exam</span>
      <button class="toggle-track" id="exam-toggle" onclick="toggleExam()"><div class="toggle-thumb"></div></button>
      <span class="exam-status-badge" id="exam-status-badge">—</span>
    </div>
    <div class="live-pill"><div class="dot"></div> Live</div>
    <button class="hbtn" onclick="refresh()"><i class="ti ti-refresh"></i> <span class="btn-label">Refresh</span></button>
    <button class="hbtn hbtn-green" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i> <span class="btn-label">Export</span></button>
  </div>
</header>

<!-- CANDIDATES VIEW -->
<div class="layout" id="candidates-view">
  <div class="sidebar">
    <div class="sidebar-title">Candidates</div>
    <div id="cand-list"><div class="empty-sidebar"><i class="ti ti-users"></i><br>Waiting for candidates…</div></div>
  </div>
  <div class="detail" id="detail">
    <div class="welcome"><i class="ti ti-user-search"></i><p>Select a candidate to review their work.</p></div>
  </div>
</div>

<!-- DASHBOARD VIEW -->
<div id="dashboard-view">
  <div class="dash-header">
    <h2><i class="ti ti-chart-bar" style="color:var(--accent)"></i> Exam dashboard</h2>
    <button class="export-btn" onclick="exportExcel()"><i class="ti ti-file-spreadsheet"></i> Export to Excel</button>
  </div>
  <div class="dash-metrics">
    <div class="dash-metric"><div class="dm-val c-total" id="dm-total">0</div><div class="dm-lbl">Total candidates</div></div>
    <div class="dash-metric"><div class="dm-val c-pass" id="dm-pass">0</div><div class="dm-lbl">Passed</div></div>
    <div class="dash-metric"><div class="dm-val c-fail" id="dm-fail">0</div><div class="dm-lbl">Failed</div></div>
    <div class="dash-metric"><div class="dm-val c-pend" id="dm-pend">0</div><div class="dm-lbl">Pending</div></div>
    <div class="dash-metric"><div class="dm-val c-avg" id="dm-avg">—</div><div class="dm-lbl">Avg score</div></div>
  </div>
  <div class="dash-charts">
    <div class="chart-card"><h3>Results breakdown</h3><div class="bar-chart" id="dash-bar"></div></div>
    <div class="chart-card"><h3>Pass / fail ratio</h3><div class="donut-wrap" id="dash-donut"></div></div>
  </div>
  <div class="results-table-wrap">
    <h3>All candidates</h3>
    <table><thead><tr><th>#</th><th>Name</th><th>Bugs found</th><th>Score</th><th>Bugs filed</th><th>Test cases</th><th>Status</th><th>Decision</th></tr></thead>
    <tbody id="dash-tbody"></tbody></table>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   PASTE YOUR SUPABASE CREDENTIALS HERE
   ══════════════════════════════════════════════════ */
/* ── SUPABASE lazy init (credentials come from config.js via GitHub Actions) ── */
let _sb = null;
function getSb(){
  if(_sb) return _sb;
  try{
    if(typeof supabase === 'undefined'){ console.error('[QA] Supabase CDN not loaded'); return null; }
    if(typeof _SUPA_URL === 'undefined' || _SUPA_URL.includes('YOUR_')){ console.error('[QA] config.js not configured'); return null; }
    _sb = supabase.createClient(_SUPA_URL, _SUPA_KEY);
    console.log('[QA] Supabase connected ✓');
  }catch(e){ console.error('[QA] Supabase error:', e.message); }
  return _sb;
}

const TOTAL_BUGS = 12;

const ANSWER_KEY = [
  {id:1,label:'Smart Watch price displays as negative ($-199.00)',sev:'critical',page:'Shop'},
  {id:2,label:'"Out of stock" Headphones can still be added to cart',sev:'high',page:'Shop'},
  {id:3,label:'Search is case-sensitive ("backpack" ≠ "Backpack")',sev:'medium',page:'Shop'},
  {id:4,label:'"Price: Low to High" sorts High to Low (inverted)',sev:'high',page:'Shop'},
  {id:5,label:'"Remove" always deletes the first cart item, not the selected',sev:'high',page:'Shop'},
  {id:6,label:'Cart badge count is always 1 less than actual (off-by-one)',sev:'medium',page:'Shop'},
  {id:7,label:'Order quantity field has no effect on the order total',sev:'high',page:'Checkout'},
  {id:8,label:'Coupon "SAVE10" always invalid (case mismatch)',sev:'medium',page:'Checkout'},
  {id:9,label:'"Place order" succeeds with an empty cart',sev:'critical',page:'Checkout'},
  {id:10,label:'Email field accepts any text — no format validation',sev:'high',page:'Checkout'},
  {id:11,label:'Required fields not validated before placing order',sev:'high',page:'Checkout'},
  {id:12,label:'"Back to shop" silently clears the entire cart',sev:'medium',page:'Checkout'},
];

/* ── STATE (in-memory cache) ── */
let selected = null;
let markings = {};   // name → bool[12]
let notes    = {};   // name → string
let decisions= {};   // name → 'pass'|'fail'|'pending'
let dummies  = {};   // name → bool
let registry = [];   // cached candidates list
let subCache = {};   // name → submissions row

/* ── SUPABASE HELPERS ── */
async function sbGetAll(table){ try{ const {data,error}=await getSb()?.from(table).select('*'); if(error) throw error; return data||[]; }catch(e){ console.warn('sbGetAll error:',e.message); return []; } }
async function sbGet(table,col,val){ try{ const {data,error}=await getSb()?.from(table).select('*').eq(col,val).maybeSingle(); if(error) throw error; return data||null; }catch(e){ console.warn('sbGet error:',e.message); return null; } }
async function sbUpsert(table,row,conflict='name'){ try{ const {error}=await getSb()?.from(table).upsert(row,{onConflict:conflict}); if(error) throw error; }catch(e){ console.warn('sbUpsert error:',e.message); } }
async function sbDelete(table,col,val){ try{ const {error}=await getSb()?.from(table).delete().eq(col,val); if(error) throw error; }catch(e){ console.warn('sbDelete error:',e.message); } }

/* ── LOAD STATE ── */
async function loadAll(){
  const [cands, subs, evals] = await Promise.all([
    sbGetAll('candidates'),
    sbGetAll('submissions'),
    sbGetAll('evaluations'),
  ]);
  registry = cands;
  subs.forEach(s=>{ subCache[s.name]=s; });
  evals.forEach(e=>{
    decisions[e.name] = e.decision||'pending';
    notes[e.name]     = e.notes||'';
    dummies[e.name]   = e.is_dummy||false;
    markings[e.name]  = e.found_bugs||new Array(TOTAL_BUGS).fill(false);
  });
}

/* ── EXAM ACTIVE TOGGLE ── */
async function fetchExamActive(){
  const d = await sbGet('settings','key','exam_active');
  return d === null || d.value !== 'false'; // null → row missing → default active
}

async function toggleExam(){
  const current = await fetchExamActive();
  const next = !current;
  // upsert guarantees the row is created if it doesn't exist yet
  await getSb()?.from('settings').upsert({key:'exam_active', value:String(next)}, {onConflict:'key'});
  updateToggleUI(next);
  console.log('[QA] exam toggled to:', next ? 'active' : 'inactive');
}

function updateToggleUI(active){
  const track  = document.getElementById('exam-toggle');
  const badge  = document.getElementById('exam-status-badge');
  if(!track||!badge) return;
  track.className = 'toggle-track '+(active?'on':'off');
  badge.className = 'exam-status-badge '+(active?'on':'off');
  badge.textContent = active ? 'Active' : 'Inactive';
}

async function syncToggleUI(){
  const active = await fetchExamActive();
  updateToggleUI(active);
}

/* ── VIEW SWITCH ── */
function switchView(v){
  document.getElementById('candidates-view').style.display = v==='candidates'?'grid':'none';
  document.getElementById('dashboard-view').style.display  = v==='dashboard' ?'block':'none';
  document.getElementById('vtab-candidates').classList.toggle('active',v==='candidates');
  document.getElementById('vtab-dashboard').classList.toggle('active',v==='dashboard');
  if(v==='dashboard') renderDashboard();
}

/* ── REFRESH ── */
async function refresh(){
  await loadAll();
  renderSidebar();
  if(selected) renderDetail(selected);
}

/* ── SIDEBAR ── */
function renderSidebar(){
  const el = document.getElementById('cand-list');
  if(!registry.length){
    el.innerHTML='<div class="empty-sidebar"><i class="ti ti-users"></i><br>Waiting for candidates…</div>';
    return;
  }
  el.innerHTML = registry.map(c=>{
    const mk    = markings[c.name]||new Array(TOTAL_BUGS).fill(false);
    const found = mk.filter(Boolean).length;
    const score = Math.round((found/TOTAL_BUGS)*100);
    const scCls = score>=70?'score-hi':score>=40?'score-mid':'score-lo';
    const sub   = subCache[c.name];
    const bugs  = sub?sub.bugs?.length:0;
    const tcs   = sub?sub.test_cases?.length:0;
    const upd   = c.updated_at?new Date(c.updated_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'—';
    const dec   = decisions[c.name]||'pending';
    const isDum = dummies[c.name]||false;
    const decCls= dec==='pass'?'res-pass':dec==='fail'?'res-fail':'';
    const decLbl= dec==='pass'?'✓ Passed':dec==='fail'?'✗ Failed':'';
    return`<div class="cand-card${selected===c.name?' active':''}${isDum?' is-dummy':''}" onclick="selectCandidate('${esc(c.name)}')">
      <div class="cand-name"><span class="res-dot ${isDum?'pending':dec}"></span>${c.name}${isDum?'<span class="dummy-chip">dummy</span>':''}</div>
      <div class="cand-meta">
        ${isDum
          ?'<span class="chip" style="background:#fff3e0;color:#b35a00">Test data</span>'
          :`<span class="chip"><i class="ti ti-bug" style="font-size:10px"></i>${bugs??0}</span>
            <span class="chip"><i class="ti ti-list-check" style="font-size:10px"></i>${tcs??0}</span>
            <span class="chip ${scCls}">${score}%</span>
            ${dec!=='pending'?`<span class="chip ${decCls}">${decLbl}</span>`:''}`}
      </div>
      <div class="cand-time">Updated: ${upd}</div>
    </div>`;
  }).join('');
}

function esc(s){ return s.replace(/'/g,"\\'"); }

async function selectCandidate(name){
  selected = name;
  renderSidebar();
  await renderDetail(name);
}

/* ── CANDIDATE DETAIL ── */
async function renderDetail(name){
  // Refresh data for this candidate
  const [sub, freshCand] = await Promise.all([
    sbGet('submissions','name',name),
    sbGet('candidates','name',name),
  ]);
  if(sub) subCache[name]=sub;
  // merge fresh candidate data into registry
  if(freshCand){
    const idx=registry.findIndex(c=>c.name===name);
    if(idx>=0) registry[idx]=freshCand; else registry.push(freshCand);
  }
  const cand = freshCand || registry.find(c=>c.name===name) || {};
  if(sub) subCache[name] = sub;

  if(!markings[name])  markings[name]  = new Array(TOTAL_BUGS).fill(false);
  if(!decisions[name]) decisions[name] = 'pending';
  if(!notes[name])     notes[name]     = '';

  const mk    = markings[name];
  const found = mk.filter(Boolean).length;
  const score = Math.round((found/TOTAL_BUGS)*100);
  const init  = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const started = cand.started_at ? new Date(cand.started_at).toLocaleString() : '—';
  const siteDesc = cand.description||'';
  const dec   = decisions[name];
  const isDum = dummies[name]||false;
  const bugs  = sub?.bugs||[];
  const tcs   = sub?.test_cases||[];

  document.getElementById('detail').innerHTML = `
    ${isDum?`<div class="dummy-banner"><i class="ti ti-test-pipe"></i><strong>Dummy / test candidate</strong> — excluded from dashboard statistics and Excel export.</div>`:''}

    <div class="cand-header">
      <div class="avatar">${init}</div>
      <div class="cand-header-info"><h2>${name}</h2><p>Started: ${started} &nbsp;|&nbsp; Status: ${cand.status||'—'}</p></div>
    </div>

    ${siteDesc
      ?`<div class="card" style="margin-bottom:16px;border-left:3px solid var(--accent)"><div class="ct"><i class="ti ti-writing"></i> Site description</div><p style="font-size:14px;line-height:1.7">${siteDesc}</p></div>`
      :`<div style="background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--text3);margin-bottom:16px;display:flex;align-items:center;gap:8px"><i class="ti ti-writing"></i> No site description written yet.</div>`}

    <div class="metrics">
      <div class="metric"><div class="mval">${bugs.length}</div><div class="mlbl">Bugs filed</div></div>
      <div class="metric"><div class="mval">${tcs.length}</div><div class="mlbl">Test cases</div></div>
      <div class="metric"><div class="mval" id="m-found">${found}/${TOTAL_BUGS}</div><div class="mlbl">Bugs found</div></div>
      <div class="metric"><div class="mval" id="m-score">${score}%</div><div class="mlbl">Score</div></div>
    </div>

    <div class="two">
      <div class="card" style="overflow:hidden">
        <div class="ct"><i class="ti ti-key"></i> Answer key (${TOTAL_BUGS} bugs)</div>
        <div class="ak-scroll">
          ${ANSWER_KEY.map((b,i)=>`
          <div class="arow">
            <i class="ti ${mk[i]?'ti-circle-check found-c':'ti-circle miss-c'} aicon" id="ak-${i}"></i>
            <div class="bug-area">
              <div><strong>Bug ${b.id}</strong><span class="sev-pip pip-${b.sev}">${b.sev}</span><span style="font-size:11px;color:var(--text3);margin-left:4px">${b.page}</span></div>
              <div class="bdesc">${b.label}</div>
            </div>
          </div>`).join('')}
        </div>
        <div class="verdict ${score>=70?'v-pass':score>=40?'v-review':'v-fail'}" id="verdict-box">
          ${score>=70?'✓ Strong — recommend advancing':score>=40?'⚠ Average — further review needed':'✗ Below expectations — missed most bugs'}
        </div>
      </div>
      <div class="card">
        <div class="ct"><i class="ti ti-checkbox"></i> Mark as found</div>
        ${ANSWER_KEY.map((b,i)=>`
        <label class="cbrow">
          <input type="checkbox" ${mk[i]?'checked':''} onchange="toggleMark('${esc(name)}',${i},this.checked)">
          <span>Bug ${b.id}: ${b.label.split('(')[0].trim()}</span>
        </label>`).join('')}
      </div>
    </div>

    <div class="sub-grid">
      <div>
        <div class="sec-title"><i class="ti ti-bug"></i> Bug reports (${bugs.length})</div>
        ${bugs.length ? bugs.map(b=>`
          <div class="bug-item sev-${b.sev}">
            <div class="bh">
              <span class="bid">BUG-${String(b.id).padStart(3,'0')}</span>
              <span class="btitle">${b.title}</span>
              <span class="badge badge-${b.sev}">${b.sev[0].toUpperCase()+b.sev.slice(1)}</span>
              ${b.pri?`<span class="badge" style="background:var(--accent-bg);color:var(--accent-text)">P${b.pri}</span>`:''}
            </div>
            ${b.steps?`<div class="bdet">Steps: ${b.steps.replace(/\n/g,' → ')}</div>`:''}
            ${b.expected?`<div class="bdet">Expected: ${b.expected}</div>`:''}
            ${b.actual?`<div class="bdet" style="color:var(--text)">Actual: ${b.actual}</div>`:''}
          </div>`).join('')
        : '<div class="empty-sec"><i class="ti ti-bug-off"></i> No bug reports yet</div>'}
      </div>
      <div>
        <div class="sec-title"><i class="ti ti-list-check"></i> Test cases (${tcs.length})</div>
        ${tcs.length ? tcs.map(t=>`
          <div class="tc-item">
            <div class="th">
              <span class="tid">TC-${String(t.id).padStart(3,'0')}</span>
              <span class="ttitle">${t.title}</span>
              <span class="pri">${t.priority}</span>
              <span class="rbadge ${t.result==='pass'?'rb-pass':t.result==='fail'?'rb-fail':'rb-pend'}">
                ${t.result?t.result[0].toUpperCase()+t.result.slice(1):'Pending'}
              </span>
            </div>
            ${t.pre?`<div class="tdet">Pre: ${t.pre}</div>`:''}
            ${t.steps?`<ol class="steps-ol">${t.steps.split('\n').filter(s=>s.trim()).map(s=>`<li>${s.replace(/^\d+\.\s*/,'')}</li>`).join('')}</ol>`:''}
            ${t.expected?`<div class="tdet">Expected: ${t.expected}</div>`:''}
          </div>`).join('')
        : '<div class="empty-sec"><i class="ti ti-list-x"></i> No test cases yet</div>'}
      </div>
    </div>

    <div class="bottom-grid">
      <div class="card">
        <div class="ct"><i class="ti ti-notes"></i> Interviewer notes</div>
        <textarea class="notes-ta" placeholder="Write your observations…"
          oninput="saveNote('${esc(name)}',this.value)">${notes[name]||''}</textarea>
      </div>
      <div class="card">
        <div class="ct"><i class="ti ti-gavel"></i> Final decision</div>
        <div class="decision-wrap">
          <button class="dec-btn dec-pass${dec==='pass'?' selected':''}" onclick="setDecision('${esc(name)}','pass')"><i class="ti ti-circle-check"></i> Pass</button>
          <button class="dec-btn dec-fail${dec==='fail'?' selected':''}" onclick="setDecision('${esc(name)}','fail')"><i class="ti ti-circle-x"></i> Fail</button>
          <button class="dec-btn dec-pending${dec==='pending'?' selected':''}" onclick="setDecision('${esc(name)}','pending')"><i class="ti ti-clock"></i> Pending</button>
        </div>
        <p class="decision-note">Saved instantly and shown on the dashboard.</p>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="ct"><i class="ti ti-settings"></i> Session controls</div>
      <div class="dummy-toggle-wrap">
        <div class="dummy-toggle-label"><i class="ti ti-test-pipe"></i> Mark as dummy / test data <span style="font-size:11px;color:var(--text3)">(excludes from stats &amp; export)</span></div>
        <button onclick="toggleDummy('${esc(name)}')"
          style="padding:6px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border-radius:var(--rs);cursor:pointer;border:1.5px solid;transition:all .15s;
          ${isDum?'background:#fff3e0;color:#b35a00;border-color:#e07b00':'background:var(--surface);color:var(--text2);border-color:var(--border2)'}">
          ${isDum?'✓ Marked as dummy — click to restore':'Mark as dummy'}
        </button>
      </div>
      <p class="ctrl-desc" style="margin-top:10px">Permanently delete all data for this candidate.</p>
      <button class="clear-btn" onclick="clearCandidate('${esc(name)}')"><i class="ti ti-trash"></i> Delete ${name.split(' ')[0]}'s data</button>
    </div>
  `;
}

/* ── MARK BUGS ── */
async function toggleMark(name, idx, val){
  if(!markings[name]) markings[name]=new Array(TOTAL_BUGS).fill(false);
  markings[name][idx] = val;
  const mk    = markings[name];
  const found = mk.filter(Boolean).length;
  const score = Math.round((found/TOTAL_BUGS)*100);
  // update UI without full re-render
  const icon = document.getElementById('ak-'+idx);
  if(icon) icon.className=`ti ${val?'ti-circle-check found-c':'ti-circle miss-c'} aicon`;
  const mf=document.getElementById('m-found'); if(mf) mf.textContent=found+'/'+TOTAL_BUGS;
  const ms=document.getElementById('m-score'); if(ms) ms.textContent=score+'%';
  const vb=document.getElementById('verdict-box');
  if(vb){ vb.className='verdict '+(score>=70?'v-pass':score>=40?'v-review':'v-fail'); vb.textContent=score>=70?'✓ Strong — recommend advancing':score>=40?'⚠ Average — further review needed':'✗ Below expectations — missed most bugs'; }
  // persist
  await saveEvaluation(name);
  renderSidebar();
}

/* ── NOTES ── */
let _noteTimer={};
function saveNote(name,val){
  notes[name]=val;
  clearTimeout(_noteTimer[name]);
  _noteTimer[name]=setTimeout(()=>saveEvaluation(name),1000);
}

/* ── DECISION ── */
async function setDecision(name, dec){
  decisions[name]=dec;
  document.querySelectorAll('.dec-btn').forEach(b=>{
    b.classList.remove('selected');
    if((dec==='pass'&&b.classList.contains('dec-pass'))||(dec==='fail'&&b.classList.contains('dec-fail'))||(dec==='pending'&&b.classList.contains('dec-pending'))) b.classList.add('selected');
  });
  await saveEvaluation(name);
  renderSidebar();
}

/* ── DUMMY ── */
async function toggleDummy(name){
  dummies[name]=!dummies[name];
  await saveEvaluation(name);
  await renderDetail(name);
  renderSidebar();
}

/* ── SAVE EVALUATION ── */
async function saveEvaluation(name){
  await sbUpsert('evaluations',{
    name,
    decision: decisions[name]||'pending',
    notes:    notes[name]||'',
    found_bugs: markings[name]||new Array(TOTAL_BUGS).fill(false),
    is_dummy: dummies[name]||false,
    updated_at: new Date().toISOString(),
  });
}

/* ── CLEAR CANDIDATE ── */
async function clearCandidate(name){
  if(!confirm(`Delete all data for ${name}? This cannot be undone.`)) return;
  await Promise.all([
    sbDelete('submissions','name',name),
    sbDelete('evaluations','name',name),
    sbDelete('candidates','name',name),
  ]);
  delete markings[name]; delete notes[name]; delete decisions[name]; delete dummies[name]; delete subCache[name];
  registry = registry.filter(c=>c.name!==name);
  if(selected===name){
    selected=null;
    document.getElementById('detail').innerHTML='<div class="welcome"><i class="ti ti-user-search"></i><p>Select a candidate from the list.</p></div>';
  }
  renderSidebar();
}

/* ── DASHBOARD ── */
function renderDashboard(){
  const allReg = registry;
  const reg    = allReg.filter(c=>!dummies[c.name]);
  const dummyCount = allReg.length - reg.length;
  const total  = reg.length;
  const passed = reg.filter(c=>decisions[c.name]==='pass').length;
  const failed = reg.filter(c=>decisions[c.name]==='fail').length;
  const pending= total - passed - failed;
  const scores = reg.map(c=>{ const mk=markings[c.name]||new Array(TOTAL_BUGS).fill(false); return Math.round((mk.filter(Boolean).length/TOTAL_BUGS)*100); });
  const avg    = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;

  document.getElementById('dm-total').textContent=total;
  document.getElementById('dm-pass').textContent=passed;
  document.getElementById('dm-fail').textContent=failed;
  document.getElementById('dm-pend').textContent=pending;
  document.getElementById('dm-avg').textContent=total?avg+'%':'—';

  const maxBar = Math.max(passed,failed,pending,1);
  document.getElementById('dash-bar').innerHTML=`
    <div class="bar-row"><div class="bar-label">Passed</div><div class="bar-track"><div class="bar-fill bf-pass" style="width:${passed/maxBar*100}%">${passed||''}</div></div><div class="bar-count">${passed}</div></div>
    <div class="bar-row"><div class="bar-label">Failed</div><div class="bar-track"><div class="bar-fill bf-fail" style="width:${failed/maxBar*100}%">${failed||''}</div></div><div class="bar-count">${failed}</div></div>
    <div class="bar-row"><div class="bar-label">Pending</div><div class="bar-track"><div class="bar-fill bf-pend" style="width:${pending/maxBar*100}%">${pending||''}</div></div><div class="bar-count">${pending}</div></div>`;

  const donutEl=document.getElementById('dash-donut');
  if(!total){donutEl.innerHTML='<p style="font-size:13px;color:var(--text3)">No data yet</p>';}
  else{
    function arc(start,sweep,color,r=38){
      if(sweep<=0)return'';
      const cx=52,cy=52,sr=(start-90)*Math.PI/180,er=(start+sweep-90)*Math.PI/180;
      const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
      return`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${sweep>180?1:0},1 ${x2},${y2} Z" fill="${color}"/>`;
    }
    const pa=passed/total*360,fa=failed/total*360,pna=pending/total*360;
    donutEl.innerHTML=`
      <svg width="104" height="104" viewBox="0 0 104 104">
        <circle cx="52" cy="52" r="38" fill="var(--surface2)"/>
        ${arc(0,pa,'#2d7a3a')}${arc(pa,fa,'#c0392b')}${arc(pa+fa,pna,'#a8a89e')}
        <circle cx="52" cy="52" r="22" fill="var(--surface)"/>
        <text x="52" y="56" text-anchor="middle" font-size="14" font-weight="600" fill="var(--text)" font-family="DM Sans,sans-serif">${total}</text>
      </svg>
      <div class="donut-legend">
        <div class="dl-row"><div class="dl-dot" style="background:#2d7a3a"></div>Passed: <strong>${passed}</strong></div>
        <div class="dl-row"><div class="dl-dot" style="background:#c0392b"></div>Failed: <strong>${failed}</strong></div>
        <div class="dl-row"><div class="dl-dot" style="background:#a8a89e"></div>Pending: <strong>${pending}</strong></div>
      </div>`;
  }

  const tbody=document.getElementById('dash-tbody');
  if(!allReg.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">No candidates yet</td></tr>';return;}
  let idx=0;
  tbody.innerHTML=allReg.map(c=>{
    const isDum=dummies[c.name]||false;
    if(!isDum) idx++;
    const mk=markings[c.name]||new Array(TOTAL_BUGS).fill(false);
    const found=mk.filter(Boolean).length;
    const score=Math.round((found/TOTAL_BUGS)*100);
    const sub=subCache[c.name];
    const bugsFiled=sub?.bugs?.length??0;
    const tcsFiled=sub?.test_cases?.length??0;
    const status=c.status||'in_progress';
    const statusLabel=status==='submitted'?'Submitted':status==='timeout'?'Timed out':'In progress';
    const dec=decisions[c.name]||'pending';
    const decLabel=dec==='pass'?'✓ Passed':dec==='fail'?'✗ Failed':'Pending';
    return`<tr style="${isDum?'opacity:.45;background:#fff8ec':''}">
      <td style="color:var(--text3);font-family:DM Mono,monospace">${isDum?'—':idx}</td>
      <td><strong>${c.name}</strong>${isDum?'<span style="margin-left:6px;font-size:10px;font-weight:600;padding:1px 7px;border-radius:20px;background:#fff3e0;color:#b35a00;border:1px solid #e07b00">dummy</span>':''}</td>
      <td>${isDum?'—':found+'/'+TOTAL_BUGS}</td>
      <td>${isDum?'—':`<span style="font-weight:600;color:${score>=70?'var(--green)':score>=40?'var(--orange)':'var(--red)'}">${score}%</span>`}</td>
      <td>${isDum?'—':bugsFiled}</td>
      <td>${isDum?'—':tcsFiled}</td>
      <td><span style="font-size:12px;color:var(--text2)">${isDum?'Dummy':statusLabel}</span></td>
      <td>${isDum?'<span style="font-size:12px;color:var(--text3)">Excluded</span>':`<span class="res-badge ${dec}">${decLabel}</span>`}</td>
    </tr>`;
  }).join('');
  if(dummyCount>0){
    const note=document.createElement('tr');
    note.innerHTML=`<td colspan="8" style="font-size:12px;color:var(--text3);padding:10px;text-align:center;border-top:1px solid var(--border)"><i class="ti ti-test-pipe" style="font-size:12px"></i> ${dummyCount} dummy candidate${dummyCount>1?'s are':' is'} hidden from statistics above</td>`;
    tbody.appendChild(note);
  }
}

/* ── EXCEL EXPORT ── */
function exportExcel(){
  const real=registry.filter(c=>!dummies[c.name]);
  if(!real.length){alert('No real candidates to export. (Dummy entries are excluded.)');return;}
  const rows=[['#','Name','Site Description','Bugs Found','Score (%)','Bugs Filed','Test Cases','Exam Status','Decision','Notes']];
  real.forEach((c,i)=>{
    const mk=markings[c.name]||new Array(TOTAL_BUGS).fill(false);
    const found=mk.filter(Boolean).length;
    const score=Math.round((found/TOTAL_BUGS)*100);
    const sub=subCache[c.name];
    const bugsFiled=sub?.bugs?.length??0;
    const tcsFiled=sub?.test_cases?.length??0;
    const status=c.status||'in_progress';
    const statusLabel=status==='submitted'?'Submitted':status==='timeout'?'Timed out':'In progress';
    const dec=decisions[c.name]||'pending';
    const decLabel=dec==='pass'?'Pass':dec==='fail'?'Fail':'Pending';
    rows.push([i+1,c.name,c.description||'',`${found}/${TOTAL_BUGS}`,score+'%',bugsFiled,tcsFiled,statusLabel,decLabel,notes[c.name]||'']);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:22},{wch:40},{wch:12},{wch:10},{wch:12},{wch:12},{wch:14},{wch:10},{wch:30}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Candidates');
  XLSX.writeFile(wb,`QA_Results_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ── REAL-TIME SUBSCRIPTION ── */
function subscribeRealtime(){
  getSb()?.channel('qa-live')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'candidates'},(payload)=>{
      if(payload.new && !registry.find(c=>c.name===payload.new.name)){
        registry.push(payload.new);
      }
      renderSidebar();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'candidates'},(payload)=>{
      if(payload.new){
        const idx=registry.findIndex(c=>c.name===payload.new.name);
        if(idx>=0) registry[idx]=payload.new; else registry.push(payload.new);
      }
      renderSidebar();
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'candidates'},(payload)=>{
      if(payload.old?.name) registry=registry.filter(c=>c.name!==payload.old.name);
      renderSidebar();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'submissions'},async(payload)=>{
      const updated=payload.new;
      if(updated?.name){
        subCache[updated.name]=updated;
        renderSidebar();
        if(selected===updated.name) await renderDetail(updated.name);
      }
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'settings'},(payload)=>{
      if(payload.new?.key==='exam_active') updateToggleUI(payload.new.value!=='false');
    })
    .subscribe((status)=>{
      console.log('Realtime status:', status);
    });
}

/* ── INIT ── */
(async()=>{
  await loadAll();
  syncToggleUI();
  renderSidebar();
  subscribeRealtime();
})();
</script>
